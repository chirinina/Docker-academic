services:
  database:
    image: mysql:8.0
    container_name: chiri-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cv_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - cv_network

  backend:
    image: samchiri/chiri-backend:v1
    build:
      context: ./backend
    container_name: chiri-backend
    restart: always
    environment:
      DB_HOST: database
      DB_USER: root
      DB_PASSWORD: root_password
      DB_NAME: cv_db
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4000/cv', res => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - cv_network

  frontend:
    image: samchiri/chiri-frontend:v1
    build:
      context: ./frontend
    container_name: chiri-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cv_network

volumes:
  mysql_data:

networks:
  cv_network:
    driver: bridge
