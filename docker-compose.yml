version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: chiri-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cv_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cv_network

  backend:
    image: chiri-backend:v1
    build: ./backend
    container_name: chiri-backend
    restart: always
    command: npm run dev
    environment:
      DB_HOST: database
      DB_USER: root
      DB_PASSWORD: root_password
      DB_NAME: cv_db
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - database
    networks:
      - cv_network

  frontend:
    image: chiri-frontend:v1
    build:
      context: ./frontend
      target: build
    container_name: chiri-frontend
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - cv_network

volumes:
  mysql_data:

networks:
  cv_network:
    driver: bridge
